<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drone Programming Study</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      background: #efece3;
      color: #333;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 540px;
      width: 90%;
      padding: 48px 36px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      text-align: center;
    }
    h1 {
      color: #877b61;
      font-size: 24px;
      margin: 0 0 24px 0;
      font-weight: 600;
    }
    p {
      font-size: 15px;
      line-height: 1.6;
      color: #555;
      margin: 12px 0;
    }
    .lang-buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-top: 36px;
    }
    .lang-btn {
      flex: 1;
      max-width: 180px;
      padding: 16px 24px;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      background: #877b61;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
      font-family: inherit;
    }
    .lang-btn:hover {
      background: #6e6450;
    }
    .lang-divider {
      margin: 20px 0 12px 0;
      border-top: 1px solid #eee;
    }
    .ko {
      color: #666;
      font-size: 14px;
    }
    .loading {
      display: none;
      margin-top: 28px;
    }
    .loading.active {
      display: block;
    }
    .spinner {
      margin: 16px auto;
      width: 32px;
      height: 32px;
      border: 3px solid #ddd;
      border-top-color: #877b61;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .buttons-section.hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Drone Programming Study</h1>

    <div class="buttons-section" id="buttonsSection">
      <p>Please select your preferred language to begin.</p>
      <p class="ko">시작하려면 선호하는 언어를 선택해 주십시오.</p>

      <div class="lang-buttons">
        <button class="lang-btn" onclick="startStudy('en')">English</button>
        <button class="lang-btn" onclick="startStudy('ko')">한국어</button>
      </div>

      <div class="lang-divider"></div>

      <p>You will be randomly assigned to one of two task formats.</p>
      <p class="ko">두 가지 과제 형식 중 하나에 무작위로 배정됩니다.</p>
    </div>

    <div class="loading" id="loadingSection">
      <p>Redirecting you to the study...</p>
      <div class="spinner" aria-hidden="true"></div>
      <p class="ko">설문으로 이동 중입니다...</p>
    </div>
  </div>

  <script>
    // === CONFIGURATION ===
    // Replace these four URLs with your actual Google Form prefilled URLs.
    // Each URL must include the prefilled assigned_group field (1 or 2).
    const FORMS = {
      en: {
        A: "https://docs.google.com/forms/d/e/1FAIpQLSf25H5Uk2pZzyzru40sjsxnbB6naGTK7IDoeC-tZbQX_-RJbQ/viewform?usp=pp_url&entry.2144947509=1",
        B: "https://docs.google.com/forms/d/e/1FAIpQLSeRNe6ug50GmKUz6Z2xxgFKcqMARj0DbpRq3ibf98odWGohsw/viewform?usp=pp_url&entry.2144947509=2"
      },
      ko: {
        A: "https://docs.google.com/forms/d/e/1FAIpQLSfeTPhBBhzFM8MTmWiwvaXvUaN4358Xv0IIHsfNkSCXn9Z1oQ/viewform?usp=pp_url&entry.2144947509=1",
        B: "https://docs.google.com/forms/d/e/1FAIpQLSf3OYj0Kb3A8V8oFDQrDcvmsqoETees5xWnIAx1_rsddYX3hA/viewform?usp=pp_url&entry.2144947509=2"
      }
    };

    function startStudy(language) {
      // Hide buttons, show loading indicator
      document.getElementById("buttonsSection").classList.add("hidden");
      document.getElementById("loadingSection").classList.add("active");

      // Randomly assign group A or B
      const group = Math.random() < 0.5 ? "A" : "B";
      const targetURL = FORMS[language][group];

      // Brief delay so user sees the loading indicator (~1 second)
      setTimeout(function() {
        window.location.replace(targetURL);
      }, 1000);
    }
  </script>
</body>
</html>
